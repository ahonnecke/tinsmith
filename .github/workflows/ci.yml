name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # manual deploy trigger — see `npm run deploy`

defaults:
  run:
    working-directory: app

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          JWT_SECRET: ci-test-secret

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build --target prod -t tinsmith-app:${{ github.sha }} .
        working-directory: app

  deploy:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      # Deploying needs a Fly credential this repo may not have yet. Skip
      # cleanly (green) when it's absent, rather than failing the run, so the
      # public repo isn't red until someone wires up deploys.
      - name: Check for Fly token
        id: guard
        run: |
          if [ -n "${FLY_API_TOKEN}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "FLY_API_TOKEN is not set — skipping deploy. See DEPLOY.md."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.guard.outputs.ready == 'true'

      - name: Deploy to Fly.io
        if: steps.guard.outputs.ready == 'true'
        run: flyctl deploy --remote-only
        working-directory: app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
