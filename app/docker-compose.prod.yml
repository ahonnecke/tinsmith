services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tinsmith
      POSTGRES_USER: tinsmith
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./db/seed:/docker-entrypoint-initdb.d/seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinsmith"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No external port exposure in prod — only internal network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tinsmith:${POSTGRES_PASSWORD}@postgres:5432/tinsmith
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
