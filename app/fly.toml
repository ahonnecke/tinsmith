# fly.toml app configuration file generated for tinsmith on 2026-04-13T15:36:36-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tinsmith'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'
  build-target = 'prod'

[deploy]
  release_command = 'node db/migrate.mjs'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
